<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="pagination(paging)" th:if="${paging.totalPages > 1}">
    <ul class="pagination justify-content-center">

        <!-- 
           #numbers.sequence(1, paging.totalPages)
           - 1부터 전체 페이지 수(totalPages)까지의 숫자 리스트를 생성합니다.
             (예: 전체 5페이지면 1, 2, 3, 4, 5 리스트 생성)
        -->
        <li class="page-item" th:each="page : ${#numbers.sequence(1, paging.totalPages)}"
            th:classappend="${page == paging.number + 1} ? 'active'">
            <!-- 
               th:href="@{/list/page/{page}(page=${page})}"
               - page 변수(1, 2, 3...)를 URL 경로에 바로 사용합니다.
            -->
            <a class="page-link" th:text="${page}" th:href="@{/list/page/{page}(page=${page})}"></a>
        </li>

    </ul>
</nav>

</body>
</html>
