<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="pagination(paging)">
    <ul class="pagination justify-content-center">

        <!-- 페이지 번호 반복문 -->
        <!--
           #numbers.sequence(1, paging.totalPages) : 1부터 전체 페이지 수까지 숫자 리스트 생성
           paging.totalPages : 전체 페이지 수 (Page 객체가 제공하는 메서드)
        -->
        <li class="page-item" th:each="num : ${#numbers.sequence(1, paging.totalPages)}"
            th:classappend="${num == paging.number + 1} ? 'active'">

            <!--
               th:href="@{/list/page/{page}(page=${num})}"
               - /list/page/1, /list/page/2 ... 형태로 링크 생성
            -->
            <a class="page-link" th:text="${num}" th:href="@{/list/page/{page}(page=${num})}"></a>
        </li>

    </ul>
</nav>

</body>
</html>
